name: my_game_hub
description: Personal game profile dashboard built with Flutter Web.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  http: ^1.5.0
  flutter:
    sdk: flutter
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.6
  go_router: ^17.3.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/game_icons/
    - assets/app_icon/